events {
    worker_connections 1024;
}

http {
    upstream backend {
        # 라운드로빈: 요청을 server_a / server_b 에 번갈아가며 분산
        server server_a:8000;
        server server_b:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # 어느 업스트림이 응답했는지 헤더로 노출 (데이터 불일치 확인용)
            add_header X-Upstream-Addr $upstream_addr always;
        }
    }
}
